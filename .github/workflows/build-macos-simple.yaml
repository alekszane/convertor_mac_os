name: Quick macOS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pandas openpyxl pyinstaller
    
    - name: Build app
      run: pyinstaller --windowed --name "TimeConverter" time_converter_macos_github.py
    
    - name: Upload app
      uses: actions/upload-artifact@v4
      with:
        name: TimeConverter
        path: dist/TimeConverter.app