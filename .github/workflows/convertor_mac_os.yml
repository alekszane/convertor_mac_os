name: Build macOS Application

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pyinstaller
    
    - name: Create icon (optional)
      run: |
        cat > create_icon.py << 'EOF'
import subprocess
import os
# Create simple icon using PIL if available, otherwise skip
try:
    from PIL import Image, ImageDraw
    img = Image.new('RGB', (512, 512), color='#2E86AB')
    draw = ImageDraw.Draw(img)
    draw.text((256, 256), "🕒", font=None, anchor="mm", fill="white")
    img.save('time_icon.png')
    # Create iconset
    os.makedirs('time_icon.iconset', exist_ok=True)
    for size in [16, 32, 64, 128, 256, 512]:
        img_resized = img.resize((size, size))
        img_resized.save(f'time_icon.iconset/icon_{size}x{size}.png')
        img_resized = img.resize((size*2, size*2))
        img_resized.save(f'time_icon.iconset/icon_{size}x{size}@2x.png')
    subprocess.run(['iconutil', '-c', 'icns', 'time_icon.iconset', '-o', 'time_icon.icns'])
    print("Icon created")
except:
    print("No icon created, using default")
EOF
        python3 create_icon.py || true
    
    - name: Build macOS App
      run: |
        ICON_FLAG=""
        if [ -f "time_icon.icns" ]; then
            ICON_FLAG="--icon=time_icon.icns"
        fi
        pyinstaller --windowed \
          --name "TimeConverter" \
          --osx-bundle-identifier "com.timeconverter.app" \
          $ICON_FLAG \
          time_converter_macos_github.py
    
    - name: Create DMG
      run: |
        brew install create-dmg
        mkdir -p dist_dmg
        create-dmg \
          --volname "TimeConverter" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "TimeConverter.app" 150 190 \
          --hide-extension "TimeConverter.app" \
          --app-drop-link 450 190 \
          "dist_dmg/TimeConverter.dmg" \
          "dist/TimeConverter.app"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: TimeConverter-macOS
        path: |
          dist/TimeConverter.app
          dist_dmg/TimeConverter.dmg
        retention-days: 30
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist_dmg/TimeConverter.dmg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
