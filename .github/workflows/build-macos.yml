name: Build macOS App

on:
  # Запуск при push в main или master
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  
  # Запуск при pull request
  pull_request:
    branches: [ main, master ]
  
  # Ручной запуск из интерфейса GitHub
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Debug build'
        required: false
        default: false
        type: boolean

jobs:
  build-macos-app:
    name: Build macOS Application
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pyinstaller
    
    - name: Build application
      run: |
        pyinstaller --windowed \
          --name "TimeConverter" \
          --osx-bundle-identifier "com.timeconverter.app" \
          --add-data "$(python -c 'import pandas as pd; print(pd.__path__[0])'):pandas" \
          --add-data "$(python -c 'import openpyxl; print(openpyxl.__path__[0])'):openpyxl" \
          time_converter_macos_github.py
    
    - name: Create DMG (optional)
      run: |
        brew install create-dmg || true
        if command -v create-dmg &> /dev/null; then
          mkdir -p dist_dmg
          create-dmg \
            --volname "TimeConverter" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "TimeConverter.app" 150 190 \
            --hide-extension "TimeConverter.app" \
            --app-drop-link 450 190 \
            "dist_dmg/TimeConverter.dmg" \
            "dist/TimeConverter.app" || true
        fi
    
    - name: Upload application bundle
      uses: actions/upload-artifact@v4
      with:
        name: TimeConverter-App
        path: dist/TimeConverter.app
        compression-level: 9
    
    - name: Upload DMG (if created)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: TimeConverter-DMG
        path: dist_dmg/TimeConverter.dmg
        compression-level: 9
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/TimeConverter.app
          dist_dmg/TimeConverter.dmg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}